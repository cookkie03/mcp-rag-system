# ============================================================
# RAG System - Configurazione Centralizzata
# Modifica SOLO questo file per configurare l'intero sistema
# ============================================================

# === PERCORSI ===
documents_path: "./data"
output_path: "./output"

# === LLM LOCALE (Ollama) ===
llm:
  provider: "ollama"
  model: "llama3.1:8b"
  base_url: "http://localhost:11434"
  temperature: 0.3
  max_tokens: 4096
  system_prompt: >
    Sei un assistente RAG intelligente. Rispondi basandoti sul contesto fornito
    dai documenti e dalla memoria. Cita le fonti quando possibile.
    Se non hai informazioni sufficienti, dillo chiaramente.

# === EMBEDDING MULTIMODALI (dual-model) ===
embeddings:
  # Modello primario: input complessi (testo lungo, codice, immagini con OCR)
  primary:
    model: "jinaai/jina-embeddings-v4"
    dimension: 1024
    task_passage: "retrieval.passage"
    task_query: "retrieval.query"
    trust_remote_code: true
  # Modello secondario: multimodalita' spinta (audio, video, fonti semplici)
  secondary:
    model: "nvidia/NV-Embed-v2"
    dimension: 4096
    trust_remote_code: true
  # Quale usare: "primary", "secondary", "auto" (sceglie in base al tipo file)
  active: "primary"

# === CHUNKING ===
chunk_size: 1024
chunk_overlap: 200
chunking_mode: "sentence"
min_text_length: 50

# === QDRANT ===
qdrant:
  mode: "http"
  host: "localhost"
  port: 6333
  collection: "documents"
  # Path locale (solo se mode: "local")
  local_path: "./qdrant_storage"

# === RICERCA ===
search:
  top_k: 10
  similarity_threshold: 0.7
  adaptive_threshold: true
  adaptive_threshold_min: 0.5
  adaptive_threshold_max: 0.9
  rerank_enabled: true
  rerank_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  rerank_top_n: 30
  rerank_alpha: 0.4

# === MEMORIA (mem0) ===
memory:
  enabled: true
  user_id: "default"
  # Configurazione mem0 locale
  mem0_config:
    vector_store:
      provider: "qdrant"
      config:
        host: "localhost"
        port: 6333
        collection_name: "mem0_memories"
    llm:
      provider: "ollama"
      config:
        model: "llama3.1:8b"
        ollama_base_url: "http://localhost:11434"
    embedder:
      provider: "ollama"
      config:
        model: "nomic-embed-text"
        ollama_base_url: "http://localhost:11434"
    version: "v1.1"

# === AUDIO (WHISPER) ===
whisper_model: "turbo"

# === PDF ===
pdf_extraction_mode: "layout"

# === OCR ===
ocr:
  enabled: true
  engine: "easyocr"
  languages: ["en", "it"]

# === PROCESSING ===
hash_buffer_size: 8192

# === ESTENSIONI SUPPORTATE ===
extensions:
  text:
    - ".txt"
    - ".md"
    - ".py"
    - ".js"
    - ".ts"
    - ".json"
    - ".yaml"
    - ".yml"
    - ".xml"
    - ".html"
    - ".htm"
    - ".css"
    - ".csv"
    - ".log"
    - ".java"
    - ".cpp"
    - ".c"
    - ".cs"
    - ".go"
    - ".rb"
    - ".php"
    - ".sh"
    - ".bash"
    - ".sql"
  pdf:
    - ".pdf"
  audio:
    - ".mp3"
    - ".m4a"
    - ".opus"
    - ".wav"
    - ".ogg"
    - ".flac"
  image:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".gif"
    - ".bmp"
    - ".tiff"
    - ".webp"
  video:
    - ".mp4"
    - ".mkv"
    - ".avi"
    - ".mov"
    - ".webm"
  notebook:
    - ".ipynb"
  excel:
    - ".xlsx"
    - ".xls"
  presentation:
    - ".pptx"

# === NOTE DI DESIGN ===
# Caso d'uso di riferimento (guida il design, non implementato direttamente):
# Studente carica materiale corso lingua (documenti, video), fa mock exam,
# viene assistito domanda per domanda con brainstorming, writing/speaking
# analysis (pronuncia, vocabolario, coesione). Richiede: chat ricorsiva
# con contesto, memoria tra sessioni, multimodalita', output strutturato.
